<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banyan — 2 Bloor West Floor Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --moss:#395542;--moss-d:#2d4535;--moss-l:#4a6e55;
  --white:#fff;--charcoal:#414141;
  --sky:#9BCBEB;--sky-d:#6ba8cf;
  --gold:#F1BE48;--lgrey:#F2F2F2;--border:#e0e0e0;
}
body{font-family:'Source Sans 3','Source Sans Pro',sans-serif;font-weight:300;color:var(--charcoal);background:var(--lgrey);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:var(--moss);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-logo{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:17px;letter-spacing:-.5px;line-height:1}
.hdr-logo small{display:block;font-size:8px;font-weight:400;letter-spacing:2.5px;opacity:.65;text-transform:uppercase;margin-top:1px}
.hdr-div{width:1px;height:26px;background:rgba(255,255,255,.25)}
.hdr-title{font-family:'Libre Franklin',sans-serif;font-weight:400;font-size:14px;opacity:.88}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:6px;padding:5px 10px;gap:7px}
.search-wrap input{background:none;border:none;outline:none;color:#fff;font-family:'Source Sans 3',sans-serif;font-size:13px;width:170px}
.search-wrap input::placeholder{color:rgba(255,255,255,.5)}

/* ADMIN BUTTON */
.admin-btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22);padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.admin-btn:hover{background:rgba(255,255,255,.22)}
.admin-btn.admin-on{background:var(--gold);color:#333;border-color:var(--gold)}
.admin-btn.admin-on:hover{background:#e5b443}
.admin-dot{width:7px;height:7px;border-radius:50%;background:#9bbfa8}
.admin-btn.admin-on .admin-dot{background:#2d4535}

/* Hide admin-only elements when not logged in */
body:not(.is-admin) .admin-only{display:none !important;}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:7px 18px;display:flex;align-items:center;gap:18px;flex-shrink:0}
.legend{display:flex;align-items:center;gap:14px;font-size:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.leg-diamond{width:10px;height:10px;flex-shrink:0;transform:rotate(45deg);border-radius:1px}
.tbar-right{margin-left:auto;display:flex;gap:7px}

/* BUTTONS */
.btn{font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:12px;padding:5px 13px;border-radius:5px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--moss);color:#fff}.btn-primary:hover{background:var(--moss-d)}
.btn-secondary{background:transparent;color:var(--moss);border:1.5px solid var(--moss)}.btn-secondary:hover{background:var(--lgrey)}
.btn-ghost{background:transparent;color:var(--charcoal);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--lgrey)}
.btn-danger{background:transparent;color:#c0392b;border:1.5px solid #e57373}.btn-danger:hover{background:#ffeeed}
.btn-sm{padding:4px 10px;font-size:11px}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}
.fp-area{flex:1;overflow:auto;padding:16px;display:flex;align-items:flex-start;justify-content:center}
.fp-wrap{background:#fff;border-radius:10px;box-shadow:0 2px 18px rgba(0,0,0,.09);overflow:hidden;max-width:1000px;width:100%;transform-origin:center top;transition:transform .15s ease}
#fp-svg{width:100%;height:auto;display:block}
.desk{cursor:pointer}
.desk:hover .d-shape{filter:brightness(1.12)}
body.move-mode .fp-area{cursor:crosshair}
body.move-mode .desk{cursor:crosshair}
.move-banner{position:fixed;top:52px;left:0;right:0;background:#F1BE48;color:#333;text-align:center;padding:8px 16px;font-weight:600;font-size:13px;z-index:50;display:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.move-banner .cancel-link{margin-left:12px;color:#7a5a00;cursor:pointer;text-decoration:underline}
body.move-mode .move-banner{display:block}

/* SIDEBAR */
.sidebar{width:0;overflow:hidden;transition:width .22s ease;background:#fff;border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
.sidebar.open{width:310px}
.sb-inner{width:310px;height:100%;overflow-y:auto;display:flex;flex-direction:column}
.sb-hdr{padding:15px 18px;position:relative;flex-shrink:0}
.sb-zone{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;opacity:.72;margin-bottom:3px}
.sb-id{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:20px}
.sb-type{font-size:11px;opacity:.75;margin-top:2px}
.sb-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.sb-body{padding:16px;flex:1}

/* OCCUPANT */
.occ-card{background:var(--lgrey);border-radius:7px;padding:12px;display:flex;align-items:center;gap:11px;margin-bottom:14px}
.occ-av{width:40px;height:40px;border-radius:50%;background:var(--moss);color:#fff;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.occ-av.empty{background:#bbb}
.occ-av.exec{background:var(--moss-d)}
.occ-name{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:14px}
.occ-sub{font-size:11px;color:#888;margin-top:2px}
.form-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.form-actions .btn{flex:1}

/* FORM */
.fg{margin-bottom:12px}
.flabel{font-size:11px;font-weight:600;color:var(--moss);letter-spacing:.5px;margin-bottom:4px;display:block}
.finput{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:13px;color:var(--charcoal);outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--moss)}
.divider{height:1px;background:var(--border);margin:14px 0}
.sec-title{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:12px;color:var(--charcoal);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-day{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;border:1.5px solid transparent;transition:all .13s;background:var(--lgrey)}
.cal-day .dn{font-weight:600;font-size:12px;line-height:1.1}
.cal-day .dd{font-size:8px;opacity:.65;text-transform:uppercase}
.cal-day.avail{background:#eaf3ee;border-color:#9bbfa8}
.cal-day.avail:hover{background:var(--moss);color:#fff;border-color:var(--moss-d)}
.cal-day.booked{background:#fde8e8;border-color:#e8a0a0;cursor:default}
.cal-day.booked-today{background:var(--sky);border-color:var(--sky-d);cursor:default}
.cal-day.past{opacity:.38;cursor:default}
.cal-day.weekend{opacity:.55}

/* BOOKING LIST */
.bk-list{display:flex;flex-direction:column;gap:5px}
.bk-item{background:var(--lgrey);border-radius:5px;padding:7px 9px;display:flex;align-items:center;gap:8px;font-size:12px}
.bk-date{font-weight:600;font-size:11px;min-width:46px;color:var(--moss)}
.bk-name{flex:1;line-height:1.3}
.bk-del{background:none;border:none;color:#aaa;cursor:pointer;font-size:15px;padding:0 2px;line-height:1}
.bk-del:hover{color:#c0392b}
.empty-st{text-align:center;padding:16px;color:#aaa;font-size:12px}

/* RIGHT CALENDAR PANEL */
.cal-panel{width:260px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cal-panel-hdr{padding:12px 14px 8px;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:13px;color:var(--moss);border-bottom:1px solid var(--border);flex-shrink:0}
.cal-panel-body{flex:1;overflow-y:auto;padding:10px 14px 14px}
.cp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cp-day{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;border:1.5px solid transparent;transition:all .13s;background:var(--lgrey);position:relative}
.cp-day .dd{font-size:7px;opacity:.6;text-transform:uppercase}
.cp-day .dn{font-weight:600;font-size:11px;line-height:1.1}
.cp-day.cp-today{background:#eaf3ee;border-color:var(--moss)}
.cp-day.cp-has-bookings{background:#fff3d6;border-color:#e0c67a}
.cp-day.cp-selected{background:var(--moss);color:#fff;border-color:var(--moss-d)}
.cp-day.cp-selected .dd{opacity:.8}
.cp-day.cp-weekend{opacity:.5}
.cp-day:hover:not(.cp-selected){background:#e8e8e8}
.cp-badge{position:absolute;top:-3px;right:-3px;background:var(--moss);color:#fff;font-size:7px;font-weight:700;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;line-height:1}
.cp-day.cp-selected .cp-badge{background:var(--gold);color:#333}
.cp-date-label{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:12px;color:var(--charcoal);margin-bottom:6px}
.cp-booking{background:var(--lgrey);border-radius:5px;padding:7px 9px;margin-bottom:4px;font-size:11px;display:flex;align-items:center;gap:8px}
.cp-booking .cp-desk-id{font-weight:700;color:var(--moss);min-width:32px}
.cp-booking .cp-bk-name{flex:1;line-height:1.3}
.cp-no-bookings{text-align:center;padding:18px 8px;color:#aaa;font-size:11px}
.cp-summary{display:flex;gap:10px;margin-bottom:10px;font-size:11px;color:#666}
.cp-summary span{font-weight:600;color:var(--moss)}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--charcoal);color:#fff;padding:9px 18px;border-radius:6px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:1000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:500;display:none;align-items:center;justify-content:center}
.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:10px;padding:26px;width:360px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-title{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:17px;margin-bottom:18px;color:var(--moss)}
.modal-actions{display:flex;gap:9px;margin-top:18px;justify-content:flex-end}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">banyan<small>SOFTWARE</small></div>
  <div class="hdr-div"></div>
  <div class="hdr-title">2 Bloor West — Seat Manager</div>
  <div class="hdr-right">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Find a person…">
    </div>
    <button class="admin-btn" id="admin-btn" onclick="adminBtnClick()" title="Log in as admin to make changes"><span class="admin-dot"></span><span id="admin-btn-label">Admin Login</span></button>
  </div>
</header>

<div class="move-banner" id="move-banner">
  🔀 Click a desk to move <span id="move-name"></span> there
  <span class="cancel-link" onclick="cancelMove()">Cancel</span>
</div>

<div class="toolbar">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--moss)"></div><span>Assigned</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#fff;border:2px solid var(--moss)"></div><span>Unassigned</span></div>
    <div class="leg-item"><div class="leg-diamond" style="background:var(--sky);border:1.5px solid var(--sky-d)"></div><span>Hotel (available)</span></div>
    <div class="leg-item"><div class="leg-diamond" style="background:#1e4d6b;border:1.5px solid #143a52"></div><span>Hotel (booked)</span></div>
  </div>
  <div class="tbar-right">
    <button class="btn btn-ghost btn-sm admin-only" onclick="exportData()">Export</button>
    <button class="btn btn-secondary btn-sm admin-only" onclick="importData()">Import</button>
    <button class="btn btn-danger btn-sm admin-only" onclick="resetToDefault()">Reset</button>
  </div>
</div>

<div class="main">
  <div class="fp-area">
    <div class="fp-wrap">
      <svg id="fp-svg" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'Source Sans 3','Source Sans Pro',sans-serif">
        <defs>
          <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".10"/>
          </filter>
        </defs>

        <!-- Clean floor plan — UPDATED FLOOR PLAN 17SEP2025 -->
        <image href="floorplan-clean.png" x="0" y="0" width="1000" height="800" preserveAspectRatio="none"/>

        <!-- ═══ DESKS (JS rendered) ═══ -->
        <g id="desks-layer"></g>
        <g id="highlight-layer"></g>
      </svg>
    </div>
  </div>

  <!-- CALENDAR PANEL (always visible) -->
  <div class="cal-panel" id="cal-panel">
    <div class="cal-panel-hdr">Hotel Desk Bookings</div>
    <div class="cal-panel-body">
      <div id="cp-calendar"></div>
      <div id="cp-detail"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-inner">
      <div class="sb-hdr" id="sb-hdr">
        <div class="sb-id" id="sb-id"></div>
        <div class="sb-type" id="sb-type"></div>
        <button class="sb-close" onclick="closeSidebar()">×</button>
      </div>
      <div class="sb-body" id="sb-body"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Assign Modal -->
<div class="modal-ov" id="m-assign">
  <div class="modal">
    <div class="modal-title" id="m-assign-title">Assign Desk</div>
    <div class="fg"><label class="flabel">Person's Name</label><input class="finput" id="a-name" placeholder="Full name"></div>
    <div class="fg"><label class="flabel">Team / Department</label><input class="finput" id="a-team" placeholder="e.g. Finance, M&amp;A…"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('m-assign')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAssign()">Assign</button>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div class="modal-ov" id="m-admin">
  <div class="modal">
    <div class="modal-title">Admin Login</div>
    <div class="fg"><label class="flabel">Password</label><input class="finput" id="admin-pwd" type="password" placeholder="Enter admin password" autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('m-admin')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAdmin()">Log In</button>
    </div>
  </div>
</div>

<!-- Book Modal -->
<div class="modal-ov" id="m-book">
  <div class="modal">
    <div class="modal-title">Book Hotel Desk</div>
    <div class="fg"><label class="flabel">Date</label><input class="finput" id="b-date" type="date"></div>
    <div class="fg"><label class="flabel">Your Name</label><input class="finput" id="b-name" placeholder="Full name"></div>
    <div class="fg"><label class="flabel">Team / Department</label><input class="finput" id="b-team" placeholder="e.g. Finance, M&amp;A…"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('m-book')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmBook()">Book Desk</button>
    </div>
  </div>
</div>

// ADMIN AUTH (client-side gate — see note in source)
// Note: this is a UX gate only. The password is visible in source; for
// real security a server-side check would be required. Sufficient as an
// "honor system" speed bump for an internal trusted-network tool.

const ADMIN_PWD='kkataila';
const ADMIN_KEY='banyan_fp_admin';

function isAdmin(){return sessionStorage.getItem(ADMIN_KEY)==='1';}

function setAdmin(on){
  if(on){sessionStorage.setItem(ADMIN_KEY,'1');document.body.classList.add('is-admin');}
  else{sessionStorage.removeItem(ADMIN_KEY);document.body.classList.remove('is-admin');}
  updateAdminUI();
  // Re-render sidebar so admin-only buttons appear/disappear immediately
  if(typeof selectedId!=='undefined' && selectedId){
    const d=DESKS.find(x=>x.id===selectedId);
    if(d)renderSbBody(d);
  }
}

function updateAdminUI(){
  const btn=document.getElementById('admin-btn');
  const lbl=document.getElementById('admin-btn-label');
  if(!btn||!lbl)return;
  if(isAdmin()){
    btn.classList.add('admin-on');
    lbl.textContent='Admin ✓';
    btn.title='Admin mode active — click to log out';
  } else {
    btn.classList.remove('admin-on');
    lbl.textContent='Admin Login';
    btn.title='Log in as admin to make changes';
  }
}

function adminBtnClick(){
  if(isAdmin()){
    if(confirm('Log out of admin mode?')){
      // Cancel any active move
      if(typeof moveSource!=='undefined' && moveSource) cancelMove();
      setAdmin(false);
      toast('Logged out of admin mode');
    }
  } else {
    document.getElementById('admin-pwd').value='';
    document.getElementById('m-admin').classList.add('show');
    setTimeout(()=>document.getElementById('admin-pwd').focus(),80);
  }
}

function confirmAdmin(){
  const pwd=document.getElementById('admin-pwd').value;
  if(pwd===ADMIN_PWD){
    setAdmin(true);
    closeModal('m-admin');
    toast('Admin mode activated');
  } else {
    toast('Incorrect password');
    document.getElementById('admin-pwd').value='';
    document.getElementById('admin-pwd').focus();
  }
}

function requireAdmin(){
  if(isAdmin())return true;
  toast('Admin login required');
  adminBtnClick();
  return false;
}

// STATE (persisted to server-side state.json)
// ═══════════════════════════════════════════════
const SK = 'banyan_fp_v2';
function defaultState(){ return {assignments:{...DEFAULT_ASSIGNMENTS}, bookings:{}, deskTypes:{}, macHotels:{}}; }

function ensureState(s){
  if(!s.deskTypes) s.deskTypes={};
  if(!s.bookings)  s.bookings={};
  if(!s.macHotels) s.macHotels={};
  return s;
}

function loadState(){
  // Synchronous load — try localStorage first for instant render
  try{const r=localStorage.getItem(SK);if(r)return ensureState(JSON.parse(r));}catch(e){}
  return defaultState();
}

function saveState(){
  // Apply any desk type overrides
  if(state.deskTypes){
    Object.entries(state.deskTypes).forEach(([id,t])=>{
      const d=DESKS.find(x=>x.id===id);
      if(d) d.type = t==='hotel'?H:P;
    });
  }
  // Timestamp for conflict resolution
  state._ts = Date.now();
  // Save to localStorage (instant)
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
  // Save to server file (async, fire-and-forget)
  fetch('/api/state',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(state)
  }).catch(()=>{});
}

// Async load from server on startup — overwrites localStorage if server has data
function loadFromServer(){
  fetch('/api/state').then(r=>r.json()).then(data=>{
    if(data && data.assignments){
      // Don't overwrite if local state is newer (e.g. move just happened)
      if(state._ts && data._ts && state._ts > data._ts) return;
      state=ensureState(data);
      // Restore desk type overrides
      if(state.deskTypes){
        Object.entries(state.deskTypes).forEach(([id,t])=>{
          const d=DESKS.find(x=>x.id===id);
          if(d) d.type = t==='hotel'?H:P;
        });
      }
      try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
      renderDesks();
      renderCalPanel();
    }
  }).catch(()=>{/* server not available, localStorage is fine */});
}
function resetToDefault(){
  if(!requireAdmin())return;
  if(!confirm('Reset all assignments to the original spreadsheet data? Bookings will be cleared.'))return;
  state={assignments:{...DEFAULT_ASSIGNMENTS},bookings:{},deskTypes:{},macHotels:{}};
  // Restore original desk types from DESKS array defaults
  DESKS.forEach(d=>{const orig=d._origType;if(orig)d.type=orig;});
  saveState();renderDesks();closeSidebar();toast('Reset to default assignments');
}

let state=loadState();

let pending=null;
const TODAY=new Date().toISOString().split('T')[0];
const R=6;

// ═══════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════
function deskState(d){
  if(d.type===P){return state.assignments[d.id]?'occupied':'free';}
  const bks=state.bookings[d.id]||[];
  const viewDate = typeof cpSelectedDate!=='undefined' ? cpSelectedDate : TODAY;
  return bks.some(b=>b.date===viewDate)?'booked-today':'available';
}

function initials(name){
  if(!name)return'';
  return name.trim().split(/\s+/).map(p=>p[0]).join('').toUpperCase().slice(0,2);
}

function renderDesks(){
  const layer=document.getElementById('desks-layer');
  layer.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  DESKS.forEach(d=>{
    const ds=deskState(d);
    const isHotel=d.type===H;
    const isExec=d.zone==='EXEC';
    const isSel=d.id===selectedId;
    const isMoveSource=d.id===moveSource;
    const asgn=state.assignments[d.id];

    // Unified colour scheme — no zone-based colours
    let fill,stroke;
    if(isHotel){
      // Booked hotel desks render dark blue (Hotel + Mac Hotel both)
      fill=ds==='booked-today'?'#1e4d6b':'#9BCBEB';
      stroke=ds==='booked-today'?'#143a52':'#6ba8cf';
    } else {
      // permanent + exec: same green palette
      fill=ds==='occupied'?'#395542':'#ffffff';
      stroke='#395542';
    }

    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','desk');
    g.setAttribute('data-id',d.id);
    g.addEventListener('click',()=>selectDesk(d.id));

    const isMac = isHotel && state.macHotels && state.macHotels[d.id];
    const title=document.createElementNS(ns,'title');
    title.textContent=asgn?`${d.id} — ${asgn.name}`:(isHotel?`${d.id} (${isMac?'Mac ':''}hotel)`:`${d.id} (unassigned)`);
    g.appendChild(title);

    if(isHotel && !isExec){
      // Diamond — white halo for contrast against floor plan image
      const halo=document.createElementNS(ns,'rect');
      halo.setAttribute('x',d.x-R-1);halo.setAttribute('y',d.y-R-1);
      halo.setAttribute('width',R*2+2);halo.setAttribute('height',R*2+2);
      halo.setAttribute('fill','white');halo.setAttribute('opacity','0.82');
      halo.setAttribute('transform',`rotate(45 ${d.x} ${d.y})`);
      g.appendChild(halo);
      const shape=document.createElementNS(ns,'rect');
      shape.setAttribute('class','d-shape');
      shape.setAttribute('x',d.x-R+1);shape.setAttribute('y',d.y-R+1);
      shape.setAttribute('width',R*2-2);shape.setAttribute('height',R*2-2);
      shape.setAttribute('fill',fill);
      shape.setAttribute('stroke',isMoveSource?'#F1BE48':(isSel?'#FFD700':stroke));
      shape.setAttribute('stroke-width',(isMoveSource||isSel)?'2.5':'1.5');
      shape.setAttribute('transform',`rotate(45 ${d.x} ${d.y})`);
      g.appendChild(shape);
      // Add "H" (or "MH" for Mac) label for hotel desks
      const ht=document.createElementNS(ns,'text');
      ht.setAttribute('x',d.x);ht.setAttribute('y',d.y+(isMac?2:2.5));
      ht.setAttribute('text-anchor','middle');
      ht.setAttribute('font-family','Libre Franklin,sans-serif');
      ht.setAttribute('font-weight','600');ht.setAttribute('font-size',isMac?'5':'6');
      ht.setAttribute('fill','white');
      ht.setAttribute('pointer-events','none');
      ht.textContent=isMac?'MH':'H';
      g.appendChild(ht);
    } else {
      // Circle — white halo for contrast against floor plan image
      const halo=document.createElementNS(ns,'circle');
      halo.setAttribute('cx',d.x);halo.setAttribute('cy',d.y);halo.setAttribute('r',R+2);
      halo.setAttribute('fill','white');halo.setAttribute('opacity','0.82');
      g.appendChild(halo);
      const circle=document.createElementNS(ns,'circle');
      circle.setAttribute('class','d-shape');
      circle.setAttribute('cx',d.x);circle.setAttribute('cy',d.y);circle.setAttribute('r',R);
      circle.setAttribute('fill',fill);
      circle.setAttribute('stroke',isMoveSource?'#F1BE48':(isSel?'#FFD700':stroke));
      circle.setAttribute('stroke-width',(isMoveSource||isSel)?'2.5':'1.5');
      g.appendChild(circle);
      if(asgn){
        const t=document.createElementNS(ns,'text');
        t.setAttribute('x',d.x);t.setAttribute('y',d.y+2.5);
        t.setAttribute('text-anchor','middle');
        t.setAttribute('font-family','Libre Franklin,sans-serif');
        t.setAttribute('font-weight','600');t.setAttribute('font-size','6');
        t.setAttribute('fill','white');
        t.setAttribute('pointer-events','none');
        t.textContent=initials(asgn.name);
        g.appendChild(t);
      }
    }
    layer.appendChild(g);
  });
}

function selectDesk(id){
  if(moveSource && handleMoveTarget(id)) return;
  selectedId=id; renderDesks();
  const d=DESKS.find(x=>x.id===id); if(!d)return;
  const hdr=document.getElementById('sb-hdr');
  hdr.style.background='var(--moss)';
  hdr.style.color='white';
  document.getElementById('sb-id').textContent=d.zone==='EXEC'?'Private Office — '+id:'Desk '+id;
  const isMacDesk = d.type===H && state.macHotels && state.macHotels[id];
  document.getElementById('sb-type').textContent=
    d.zone==='EXEC'?'Private Office':
    d.type===P?'Permanent Desk':(isMacDesk?'Mac Hotel Desk (Bookable)':'Hotel Desk (Bookable)');
  renderSbBody(d);
  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar(){
  selectedId=null;renderDesks();
  document.getElementById('sidebar').classList.remove('open');
}

function renderSbBody(d){
  document.getElementById('sb-body').innerHTML=
    d.type===P?permanentHtml(d):hotelHtml(d);
}

function permanentHtml(d){
  const asgn=state.assignments[d.id];
  let html='';
  if(asgn){
    html+=`<div class="occ-card">
      <div class="occ-av">${esc(initials(asgn.name))}</div>
      <div><div class="occ-name">${esc(asgn.name)}</div><div class="occ-sub">${esc(asgn.team||'No team set')}</div></div>
    </div>
    <div class="form-actions admin-only">
      <button class="btn btn-secondary" onclick="openAssignModal('reassign')">Reassign</button>
      <button class="btn btn-secondary" onclick="startMove('${d.id}')">Move</button>
      <button class="btn btn-danger" onclick="clearAssign('${d.id}')">Clear</button>
    </div>`;
  } else {
    html+=`<div class="occ-card">
      <div class="occ-av empty" style="font-size:18px">⊕</div>
      <div><div class="occ-name">Unassigned</div><div class="occ-sub">No one sitting here</div></div>
    </div>
    <button class="btn btn-primary admin-only" style="width:100%;margin-top:8px" onclick="openAssignModal('assign')">Assign This Desk</button>`;
  }
  if(d.zone!=='EXEC'){
    html+=`<div class="divider admin-only"></div>
    <button class="btn btn-ghost admin-only" style="width:100%" onclick="convertToHotel('${d.id}')">Convert to Hotel Desk</button>`;
  }
  return html;
}

function hotelHtml(d){
  const bookings=state.bookings[d.id]||[];
  const days=[];
  for(let i=0;i<14;i++){
    const dt=new Date();dt.setDate(dt.getDate()+i);
    const ds=dt.toISOString().split('T')[0];
    const bk=bookings.find(b=>b.date===ds);
    const dow=dt.getDay();
    days.push({date:ds,dn:dt.getDate(),dd:dt.toLocaleDateString('en',{weekday:'short'}),bk,isToday:i===0,isWknd:dow===0||dow===6});
  }
  let cal='<div class="cal-grid">';
  days.forEach(day=>{
    let cls='cal-day'+(day.bk?(day.isToday?' booked-today':' booked'):' avail')+(day.isWknd?' weekend':'');
    const tip=day.bk?`Booked: ${day.bk.name}`:'Available — click to book';
    const click=!day.bk?`onclick="openBookModal('${day.date}')"`:'' ;
    cal+=`<div class="${cls}" title="${tip}" ${click}><span class="dd">${day.dd}</span><span class="dn">${day.dn}</span></div>`;
  });
  cal+='</div>';
  const upcoming=bookings.filter(b=>b.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date));
  let list=`<div class="sec-title">Upcoming Bookings</div>`;
  if(!upcoming.length){list+=`<div class="empty-st">No upcoming bookings</div>`;}
  else{
    list+=`<div class="bk-list">`;
    upcoming.forEach(b=>{
      const lbl=new Date(b.date+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});
      list+=`<div class="bk-item">
        <span class="bk-date">${lbl}</span>
        <span class="bk-name">${esc(b.name)}<br><small style="color:#999">${esc(b.team||'')}</small></span>
        <button class="bk-del" onclick="delBooking('${d.id}','${b.id}')" title="Cancel">×</button>
      </div>`;
    });
    list+=`</div>`;
  }
  const isMac = state.macHotels && state.macHotels[d.id];
  let macBtn=`<button class="btn btn-ghost admin-only" style="width:100%;margin-top:6px" onclick="toggleMacHotel('${d.id}')">${isMac?'✓ Mac Desk — click to unmark':'Mark as Mac Desk (MH)'}</button>`;
  let convertBtn=`<div class="divider admin-only"></div>
    <button class="btn btn-ghost admin-only" style="width:100%" onclick="convertToPermanent('${d.id}')">Convert to Permanent Desk</button>`;
  return`<div class="sec-title">Next 14 Days</div>${cal}<div class="divider"></div>${list}${convertBtn}${macBtn}`;
}

function openAssignModal(mode){
  if(!requireAdmin())return;
  pending={type:mode,deskId:selectedId};
  document.getElementById('m-assign-title').textContent=mode==='assign'?`Assign Desk ${selectedId}`:`Reassign Desk ${selectedId}`;
  const a=state.assignments[selectedId];
  document.getElementById('a-name').value=mode==='reassign'&&a?a.name:'';
  document.getElementById('a-team').value=mode==='reassign'&&a?a.team||'':'';
  document.getElementById('m-assign').classList.add('show');
  setTimeout(()=>document.getElementById('a-name').focus(),80);
}

function confirmAssign(){
  const name=document.getElementById('a-name').value.trim();
  const team=document.getElementById('a-team').value.trim();
  if(!name){toast('Please enter a name');return;}
  state.assignments[pending.deskId]={name,team};
  saveState();closeModal('m-assign');renderDesks();
  const d=DESKS.find(x=>x.id===pending.deskId);if(d)renderSbBody(d);
  toast(`${name} assigned to desk ${pending.deskId}`);
}

function clearAssign(id){
  if(!requireAdmin())return;
  if(!confirm(`Remove assignment from desk ${id}?`))return;
  delete state.assignments[id];saveState();renderDesks();
  const d=DESKS.find(x=>x.id===id);if(d)renderSbBody(d);
  toast('Assignment cleared');
}

// ═══════════════════════════════════════════════
// CONVERT DESK TYPE
// ═══════════════════════════════════════════════
function convertToPermanent(id){
  if(!requireAdmin())return;
  if(!confirm(`Convert desk ${id} from Hotel to Permanent?`))return;
  const d=DESKS.find(x=>x.id===id);if(!d)return;
  d.type=P;
  if(!state.deskTypes) state.deskTypes={};
  state.deskTypes[id]='permanent';
  // Clear any hotel bookings
  delete state.bookings[id];
  saveState();renderDesks();
  document.getElementById('sb-type').textContent='Permanent Desk';
  renderSbBody(d);
  toast(`Desk ${id} converted to Permanent`);
}

function convertToHotel(id){
  if(!requireAdmin())return;
  if(!confirm(`Convert desk ${id} from Permanent to Hotel?`))return;
  const d=DESKS.find(x=>x.id===id);if(!d)return;
  d.type=H;
  if(!state.deskTypes) state.deskTypes={};
  state.deskTypes[id]='hotel';
  // Clear any permanent assignment
  delete state.assignments[id];
  saveState();renderDesks();
  document.getElementById('sb-type').textContent='Hotel Desk (Bookable)';
  renderSbBody(d);
  toast(`Desk ${id} converted to Hotel`);
}

function toggleMacHotel(id){
  if(!requireAdmin())return;
  if(!state.macHotels) state.macHotels={};
  const wasMac = !!state.macHotels[id];
  if(wasMac){ delete state.macHotels[id]; }
  else { state.macHotels[id]=true; }
  saveState();renderDesks();
  // Refresh sidebar header label + body
  const d=DESKS.find(x=>x.id===id);
  if(d){
    document.getElementById('sb-type').textContent = state.macHotels[id]
      ? 'Mac Hotel Desk (Bookable)' : 'Hotel Desk (Bookable)';
    renderSbBody(d);
  }
  toast(wasMac ? `Desk ${id} unmarked as Mac` : `Desk ${id} marked as Mac (MH)`);
}

// ═══════════════════════════════════════════════
// MOVE DESK
// ═══════════════════════════════════════════════
let moveSource=null;

function startMove(id){
  if(!requireAdmin())return;
  const asgn=state.assignments[id];
  if(!asgn)return;
  moveSource=id;
  document.getElementById('move-name').textContent=asgn.name;
  document.body.classList.add('move-mode');
  closeSidebar();
  // Highlight the source desk
  renderDesks();
}

function cancelMove(){
  moveSource=null;
  document.body.classList.remove('move-mode');
  renderDesks();
}

function handleMoveTarget(targetId){
  if(!moveSource)return false;
  const srcDesk=DESKS.find(x=>x.id===moveSource);
  const tgtDesk=DESKS.find(x=>x.id===targetId);
  if(!srcDesk||!tgtDesk)return false;

  if(targetId===moveSource){
    toast('That\'s the same desk — pick a different one');
    return true;
  }

  const srcAsgn=state.assignments[moveSource];
  const tgtAsgn=state.assignments[targetId];

  // If target is a hotel desk, silently convert it to permanent first
  if(tgtDesk.type===H){
    tgtDesk.type=P;
    if(!state.deskTypes) state.deskTypes={};
    state.deskTypes[targetId]='permanent';
    delete state.bookings[targetId];
  }

  if(tgtAsgn){
    if(!confirm(`Desk ${targetId} is assigned to ${tgtAsgn.name}.\nMove ${srcAsgn.name} here and free up desk ${moveSource}?`))return true;
  }

  // Move person to target desk, free up source
  state.assignments[targetId]=srcAsgn;
  delete state.assignments[moveSource];
  // Save and re-render immediately (no reload — avoids server race condition)
  saveState();
  cancelMove();
  renderDesks();
  renderCalPanel();
  toast(`${srcAsgn.name} moved to desk ${targetId}`);
  return true;
}

// ═══════════════════════════════════════════════
// BOOKING ACTIONS
// ═══════════════════════════════════════════════
function openBookModal(date){
  pending={type:'book',deskId:selectedId,date};
  document.getElementById('b-date').value=date;
  document.getElementById('b-name').value='';
  document.getElementById('b-team').value='';
  document.getElementById('m-book').classList.add('show');
  setTimeout(()=>document.getElementById('b-name').focus(),80);
}

function confirmBook(){
  const date=document.getElementById('b-date').value;
  const name=document.getElementById('b-name').value.trim();
  const team=document.getElementById('b-team').value.trim();
  if(!name){toast('Please enter your name');return;}
  if(!date){toast('Please select a date');return;}
  if(!state.bookings[pending.deskId])state.bookings[pending.deskId]=[];
  if(state.bookings[pending.deskId].some(b=>b.date===date)){toast('Already booked for that date');return;}
  state.bookings[pending.deskId].push({id:Date.now().toString(),date,name,team});
  saveState();closeModal('m-book');renderDesks();
  const d=DESKS.find(x=>x.id===pending.deskId);if(d)renderSbBody(d);
  const lbl=new Date(date+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});
  toast(`${name} booked desk ${pending.deskId} — ${lbl}`);
}

function delBooking(deskId,bkId){
  if(!state.bookings[deskId])return;
  state.bookings[deskId]=state.bookings[deskId].filter(b=>b.id!==bkId);
  saveState();renderDesks();
  const d=DESKS.find(x=>x.id===deskId);if(d)renderSbBody(d);
  toast('Booking cancelled');
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const hl=document.getElementById('highlight-layer');
  hl.innerHTML='';
  if(!q)return;
  const ns='http://www.w3.org/2000/svg';
  const hits=DESKS.filter(d=>{
    const a=state.assignments[d.id];
    return a&&a.name.toLowerCase().includes(q);
  });
  hits.forEach(d=>{
    const ring=document.createElementNS(ns,'circle');
    ring.setAttribute('cx',d.x);ring.setAttribute('cy',d.y);ring.setAttribute('r',R+5);
    ring.setAttribute('fill','none');ring.setAttribute('stroke','#FFD700');
    ring.setAttribute('stroke-width','2.5');ring.setAttribute('opacity','.9');
    hl.appendChild(ring);
  });
  if(hits.length===1)selectDesk(hits[0].id);
});

// ═══════════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════════
function exportData(){
  if(!requireAdmin())return;
  const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),assignments:state.assignments,bookings:state.bookings,deskTypes:state.deskTypes||{},macHotels:state.macHotels||{}},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`banyan-floorplan-${TODAY}.json`;a.click();URL.revokeObjectURL(a.href);
  toast('Exported');
}

function importData(){
  if(!requireAdmin())return;
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.assignments)state.assignments=data.assignments;
        if(data.bookings)state.bookings=data.bookings;
        if(data.deskTypes){
          state.deskTypes=data.deskTypes;
          // Apply desk type overrides to the in-memory DESKS array
          Object.entries(state.deskTypes).forEach(([id,t])=>{
            const dd=DESKS.find(x=>x.id===id);
            if(dd) dd.type = t==='hotel'?H:P;
          });
        }
        if(data.macHotels)state.macHotels=data.macHotels;
        saveState();renderDesks();renderCalPanel();closeSidebar();toast('Imported successfully');
      }catch{toast('Error: invalid file');}
    };r.readAsText(f);
  };inp.click();
}

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('show');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

// Modal backdrops + enter keys
document.querySelectorAll('.modal-ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)closeModal(ov.id);}));
['a-name','a-team'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')confirmAssign();}));
['b-name','b-team'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')confirmBook();}));
document.getElementById('admin-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdmin();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&moveSource)cancelMove();});

// Restore admin state on load (sessionStorage survives page reloads in the same tab)
if(isAdmin()) document.body.classList.add('is-admin');
updateAdminUI();

// ═══════════════════════════════════════════════
// CALENDAR PANEL (right side — all hotel bookings)
// ═══════════════════════════════════════════════
let cpSelectedDate = TODAY;

function renderCalPanel(){
  // Build 14-day grid
  const days = [];
  for(let i=0;i<14;i++){
    const dt=new Date();dt.setDate(dt.getDate()+i);
    const ds=dt.toISOString().split('T')[0];
    const dow=dt.getDay();
    // Count bookings across ALL hotel desks for this date
    let count=0;
    DESKS.forEach(d=>{
      if(d.type===H){
        const bks=state.bookings[d.id]||[];
        if(bks.some(b=>b.date===ds)) count++;
      }
    });
    days.push({date:ds,dn:dt.getDate(),dd:dt.toLocaleDateString('en',{weekday:'short'}),count,isToday:i===0,isWknd:dow===0||dow===6});
  }

  let cal='<div class="cp-grid">';
  days.forEach(day=>{
    let cls='cp-day';
    if(day.date===cpSelectedDate) cls+=' cp-selected';
    else if(day.isToday) cls+=' cp-today';
    else if(day.count>0) cls+=' cp-has-bookings';
    if(day.isWknd) cls+=' cp-weekend';
    const badge=day.count>0?`<span class="cp-badge">${day.count}</span>`:'';
    cal+=`<div class="${cls}" onclick="selectCalDay('${day.date}')"><span class="dd">${day.dd}</span><span class="dn">${day.dn}</span>${badge}</div>`;
  });
  cal+='</div>';
  document.getElementById('cp-calendar').innerHTML=cal;

  renderCalDetail();
}

function selectCalDay(date){
  cpSelectedDate=date;
  renderCalPanel();
  // Update the floor plan to highlight desks booked on this date
  renderDesks();
}

function renderCalDetail(){
  const dateLbl=new Date(cpSelectedDate+'T12:00:00').toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'});

  // Gather all hotel bookings for the selected date
  const bookings=[];
  DESKS.forEach(d=>{
    if(d.type===H){
      const bks=state.bookings[d.id]||[];
      const bk=bks.find(b=>b.date===cpSelectedDate);
      if(bk) bookings.push({deskId:d.id, name:bk.name, team:bk.team||''});
    }
  });

  // Count available hotel desks
  const totalHotel=DESKS.filter(d=>d.type===H).length;
  const booked=bookings.length;
  const avail=totalHotel-booked;

  let html=`<div class="cp-date-label">${esc(dateLbl)}</div>`;
  html+=`<div class="cp-summary"><span>${booked}</span> booked &nbsp;·&nbsp; <span>${avail}</span> available</div>`;

  if(!bookings.length){
    html+=`<div class="cp-no-bookings">No hotel bookings this day</div>`;
  } else {
    bookings.sort((a,b)=>a.deskId.localeCompare(b.deskId,undefined,{numeric:true}));
    bookings.forEach(b=>{
      html+=`<div class="cp-booking" onclick="selectDesk('${b.deskId}')" style="cursor:pointer">
        <span class="cp-desk-id">${esc(b.deskId)}</span>
        <span class="cp-bk-name">${esc(b.name)}<br><small style="color:#999">${esc(b.team)}</small></span>
      </div>`;
    });
  }
  document.getElementById('cp-detail').innerHTML=html;
}

// ═══════════════════════════════════════════════
// SCROLL-TO-ZOOM
// ═══════════════════════════════════════════════
let mapZoom = parseFloat(sessionStorage.getItem('fp_zoom')) || 1;
const fpArea = document.querySelector('.fp-area');
const fpWrap = document.querySelector('.fp-wrap');

function applyZoom(){
  fpWrap.style.transform = `scale(${mapZoom})`;
  fpWrap.style.maxWidth = (1000 * mapZoom) + 'px';
  sessionStorage.setItem('fp_zoom', mapZoom);
}
// Restore zoom on load
if(mapZoom !== 1) applyZoom();

fpArea.addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;   // only zoom on Ctrl+scroll
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  mapZoom = Math.min(4, Math.max(0.5, mapZoom + delta));
  applyZoom();
}, {passive: false});

// Double-click to reset zoom
fpArea.addEventListener('dblclick', () => {
  mapZoom = 1;
  applyZoom();
});

// INIT
// ═══════════════════════════════════════════════
renderDesks();
renderCalPanel();
loadFromServer();
